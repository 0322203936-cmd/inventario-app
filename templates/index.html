<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
</head>

<body class="bg-light">

<div class="container mt-3">
    <h3 class="text-center">📦 Inventario Choferes</h3>

    <form method="POST" class="card p-3 shadow mt-3">
        <input class="form-control mb-2" name="chofer" placeholder="Chofer" required>
        <input class="form-control mb-2" name="producto" placeholder="Producto" required>
        <input class="form-control mb-2" type="number" name="cantidad" placeholder="Cantidad" required>
        <button class="btn btn-primary">Guardar</button>
    </form>

    <div class="mt-4">
        <h5>Registros</h5>
        <table class="table table-sm">
            <tr>
                <th>Chofer</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Fecha</th>
            </tr>

            {% for r in registros %}
            <tr>
                <td>{{ r.chofer }}</td>
                <td>{{ r.producto }}</td>
                <td>{{ r.cantidad }}</td>
                <td>{{ r.fecha }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/service-worker.js');
}
</script>

</body>
</html>
