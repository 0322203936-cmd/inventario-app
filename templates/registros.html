<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registros - Merma e Inventario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        .phone-wrapper {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            background: #fff;
            display: flex;
            flex-direction: column;
        }
        .app-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 16px 14px;
            border-bottom: 1px solid #e8eaed;
        }
        .back-arrow {
            color: #1a73e8;
            font-size: 20px;
            cursor: pointer;
            text-decoration: none;
        }
        .app-header h5 {
            color: #1a73e8;
            font-size: 17px;
            font-weight: 600;
            margin: 0;
        }
        .content {
            padding: 16px;
            flex: 1;
        }
        .new-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 9px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            margin-bottom: 16px;
        }
        .new-btn:hover { background: #1557b0; color: #fff; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            font-weight: 600;
            color: #5f6368;
            padding: 6px 8px;
            border-bottom: 2px solid #e8eaed;
            text-align: left;
        }
        tbody tr { border-bottom: 1px solid #f1f3f4; }
        tbody td { padding: 8px; color: #202124; }
        .empty { text-align: center; color: #9aa0a6; padding: 32px; font-size: 14px; }
    </style>
</head>
<body>
<div class="phone-wrapper">
    <div class="app-header">
        <a href="/" class="back-arrow">&#8592;</a>
        <h5>Registros Guardados</h5>
    </div>
    <div class="content">
        <a href="/" class="new-btn">+ Nuevo Registro</a>
        {% if registros %}
        <table>
            <thead>
                <tr>
                    <th>Tienda</th>
                    <th>Producto</th>
                    <th>Inv.</th>
                    <th>Merma</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                {% for r in registros %}
                <tr>
                    <td>{{ r[1] }}</td>
                    <td>{{ r[4] }}</td>
                    <td>{{ r[5] }}</td>
                    <td>{{ r[6] }}</td>
                    <td>{{ r[2] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty">No hay registros aún.</div>
        {% endif %}
    </div>
</div>
</body>
</html>
